<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#ffffff",
                "background-light": "#f7f7f7",
                "background-dark": "#09090b",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<title>Minimalist Signup</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden max-w-[430px] mx-auto border-x border-slate-200 dark:border-zinc-800">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<button aria-label="Go back" class="text-slate-900 dark:text-primary flex size-12 shrink-0 items-center justify-start hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined !text-[24px]">arrow_back</span>
</button>
</div>
<!-- Header Section -->
<div class="px-6 pt-10 pb-8">
<h1 class="text-slate-900 dark:text-primary tracking-tight text-[32px] font-bold leading-tight">Create Account</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Join us by filling in the details below.</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-6 px-6">
<!-- Name Input -->
<div class="flex flex-col w-full">
<p class="text-slate-900 dark:text-primary text-sm font-medium leading-normal pb-2 uppercase tracking-wider">Name</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-primary focus:outline-0 focus:ring-0 border border-slate-300 dark:border-primary bg-transparent focus:border-slate-900 dark:focus:border-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="Enter your full name" type="text"/>
</div>
<!-- Email Input -->
<div class="flex flex-col w-full">
<p class="text-slate-900 dark:text-primary text-sm font-medium leading-normal pb-2 uppercase tracking-wider">Email</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-primary focus:outline-0 focus:ring-0 border border-slate-300 dark:border-primary bg-transparent focus:border-slate-900 dark:focus:border-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="Enter your email address" type="email"/>
</div>
<!-- Password Input -->
<div class="flex flex-col w-full">
<p class="text-slate-900 dark:text-primary text-sm font-medium leading-normal pb-2 uppercase tracking-wider">Password</p>
<div class="flex w-full items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 rounded-lg rounded-r-none border-r-0 text-slate-900 dark:text-primary focus:outline-0 focus:ring-0 border border-slate-300 dark:border-primary bg-transparent focus:border-slate-900 dark:focus:border-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] text-base font-normal leading-normal" placeholder="Create a secure password" type="password"/>
<div class="text-slate-400 dark:text-slate-500 flex border border-slate-300 dark:border-primary bg-transparent items-center justify-center pr-[15px] rounded-r-lg border-l-0">
<span class="material-symbols-outlined cursor-pointer hover:text-slate-900 dark:hover:text-primary">visibility</span>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full h-14 bg-slate-900 dark:bg-primary text-slate-100 dark:text-background-dark font-bold text-lg rounded-lg hover:opacity-90 transition-all active:scale-[0.98]">
                    Sign Up
                </button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-auto pb-10 flex justify-center px-6">
<p class="text-slate-500 dark:text-slate-400 text-base">
                Already have an account? 
                <a class="text-slate-900 dark:text-primary font-semibold underline underline-offset-4 decoration-1" href="#">Log in</a>
</p>
</div>
</div>
</body></html>
